services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: flowmanager-api:local
    container_name: flowmanager-api
    ports:
      - "5000:8080"
    volumes:
      - flowmanager-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: flowmanager-client:local
    container_name: flowmanager-client
    ports:
      - "3000:80"
    environment:
      - API_URL=http://api:80
    depends_on:
      - api
    restart: unless-stopped

volumes:
  flowmanager-data:
    driver: local
